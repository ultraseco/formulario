<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Trabajo - Ultra Seco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ultra Seco</h1>
            <h2>Estructura de Ficha de Trabajo</h2>
        </header>

        <form id="employmentForm">
            <!-- I. Información Personal y de Contacto -->
            <section>
                <h3>I. Información Personal y de Contacto</h3>
                <div class="form-group">
                    <label for="nombres_completos">Nombres Completos:</label>
                    <input type="text" id="nombres_completos" name="nombres_completos" required>
                </div>
                <div class="form-group">
                    <label for="apellidos_completos">Apellidos Completos:</label>
                    <input type="text" id="apellidos_completos" name="apellidos_completos" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="cedula_identidad">Cédula de Identidad:</label>
                        <input type="text" id="cedula_identidad" name="cedula_identidad" required>
                    </div>
                    <div class="form-group">
                        <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
                        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="nacionalidad">Nacionalidad:</label>
                    <input type="text" id="nacionalidad" name="nacionalidad" required>
                </div>
                <div class="form-group">
                    <label for="domicilio">Domicilio (Dirección exacta):</label>
                    <textarea id="domicilio" name="domicilio" rows="2" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="telefono_movil">Teléfono Móvil:</label>
                        <input type="tel" id="telefono_movil" name="telefono_movil" required>
                    </div>
                    <div class="form-group">
                        <label for="correo_electronico">Correo Electrónico:</label>
                        <input type="email" id="correo_electronico" name="correo_electronico" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Vehículo Propio:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="vehiculo_propio_radio" value="si" onclick="document.getElementById('vehiculo_propio').checked = true; document.getElementById('vehiculo_info').style.display = 'block';"> Sí</label>
                        <label><input type="radio" name="vehiculo_propio_radio" value="no" onclick="document.getElementById('vehiculo_propio').checked = false; document.getElementById('vehiculo_info').style.display = 'none';"> No</label>
                        <input type="checkbox" id="vehiculo_propio" name="vehiculo_propio" style="display:none">
                    </div>
                    <div id="vehiculo_info" style="display:none; margin-top: 10px;">
                        <label for="vehiculo_modelo_year">Modelo/Año:</label>
                        <input type="text" id="vehiculo_modelo_year" name="vehiculo_modelo_year" placeholder="Ej: Toyota Corolla 2015">
                    </div>
                </div>
            </section>

            <!-- II. Perfil Comercial y Experiencia -->
            <section>
                <h3>II. Perfil Comercial y Experiencia</h3>
                <p class="section-desc">Esta sección nos permite conocer tu trayectoria en el sector industrial y comercial.</p>
                <div class="form-group">
                    <label for="experiencia_ferretera">Experiencia en el sector ferretero:</label>
                    <textarea id="experiencia_ferretera" name="experiencia_ferretera" rows="3" placeholder="(Años de experiencia, áreas de especialidad o cargos desempeñados)"></textarea>
                </div>
                <div class="form-group">
                    <label for="clientes_principales">Clientes Principales:</label>
                    <textarea id="clientes_principales" name="clientes_principales" rows="2" placeholder="(Indique los 3 clientes o empresas más relevantes con los que trabaja actualmente)"></textarea>
                </div>
                <div class="form-group">
                    <label for="volumen_facturacion">Volumen de Facturación Promedio Mensual (Actual):</label>
                    <input type="text" id="volumen_facturacion" name="volumen_facturacion">
                </div>
            </section>

            <!-- III. Referencias Personales -->
            <section>
                <h3>III. Referencias Personales</h3>
                <div class="reference-row">
                    <h4>Referencia 1</h4>
                    <div class="form-group">
                        <label>Nombre y Apellido:</label>
                        <input type="text" name="referencia_1_nombre">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Teléfono de Contacto:</label>
                            <input type="tel" name="referencia_1_telefono">
                        </div>
                        <div class="form-group">
                            <label>Relación / Parentesco:</label>
                            <input type="text" name="referencia_1_relacion">
                        </div>
                    </div>
                </div>
                <div class="reference-row">
                    <h4>Referencia 2</h4>
                    <div class="form-group">
                        <label>Nombre y Apellido:</label>
                        <input type="text" name="referencia_2_nombre">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Teléfono de Contacto:</label>
                            <input type="tel" name="referencia_2_telefono">
                        </div>
                        <div class="form-group">
                            <label>Relación / Parentesco:</label>
                            <input type="text" name="referencia_2_relacion">
                        </div>
                    </div>
                </div>
            </section>

            <button type="submit" id="submitBtn">Enviar Solicitud</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        document.getElementById('employmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Enviando...';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Ajuste para el checkbox de vehículo
            data.vehiculo_propio = document.getElementById('vehiculo_propio').checked;

            try {
                const response = await fetch('/api/solicitud', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();
                if (result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerText = '¡Solicitud enviada con éxito!';
                    e.target.reset();
                    document.getElementById('vehiculo_info').style.display = 'none';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerText = 'Error: ' + result.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerText = 'Error de conexión con el servidor.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Enviar Solicitud';
            }
        });
    </script>
</body>
</html>
